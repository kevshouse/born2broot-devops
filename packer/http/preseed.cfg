# Language and Locale
d-i debian-installer/locale string en_GB.UTF-8
d-i keyboard-configuration/xkb-keymap select gb

# Network Configuration
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string born2broot
d-i netcfg/get_domain string local

# User Account Setup
# Note: Root login is disabled, and a sudo user is created.
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Packer User
d-i passwd/username string packer
d-i passwd/user-password password packer
d-i passwd/user-password-again password packer
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

# Partitioning (LVM Setup)
d-i partman-auto/method string lvm
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# Expert Recipe: Defining the partitions
# Format: MinSize Priority MaxSize FileSystem
d-i partman-auto/expert_recipe string                         \
      born2broot-recipe ::                                    \
              512 512 512 ext4                                \
                      $primary{ } $bootable{ }                \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ /boot }                     \
              .                                               \
              1000 10000 -1 ext4                              \
                      $lvmok{ }                               \
                      lv_name{ root }                         \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .                                               \
              2048 2048 2048 linux-swap                       \
                      $lvmok{ }                               \
                      lv_name{ swap }                         \
                      method{ swap } format{ }                \
              .

# Confirm partitioning
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Package Selection
# Only install SSH and standard system tools for a minimal "born2bRoot" base.
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string sudo, curl, vim
d-i pkgsel/upgrade select full-upgrade

# Grub Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string /dev/sda

# Finalize Installation
d-i finish-install/reboot_directly_now boolean true
# This ensures the hardware clock is set without asking
d-i clock-setup/utc boolean true
# This forces a reboot regardless of any final installer prompts
d-i preseed/late_command string in-target reboot